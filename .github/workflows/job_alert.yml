name: Job Alert

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write   # REQUIRED for pushing seen_jobs.json

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-jobspy scikit-learn requests

      - name: Run job alert
        run: python job_alert.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit seen jobs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          git add seen_jobs.json || true
          
          git diff --cached --quiet || git commit -m "update seen jobs"
          
          git push